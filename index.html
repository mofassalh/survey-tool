<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ডিজিটাল ভূমি জরিপ ও নকশা — RS/CS</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla&display=swap" rel="stylesheet">
<style>
:root {
  --green: #006a4e;
  --green-light: #e8f4f0;
  --green-mid: #008a65;
  --dark: #1a1a1a;
  --gold: #b8860b;
  --gold-light: #f5e6b8;
  --paper: #ffffff;
  --input-bg: #fff;
  --shadow: 0 2px 15px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hind Siliguri', sans-serif; background: #f0f2f5; color: #222; overflow-x: hidden; }

/* ── CONTROL PANEL ── */
.control-panel {
  width: 400px; background: #fff; 
  height: 100vh; position: fixed; left: 0; top: 0;
  overflow-y: auto; border-right: 1px solid #ddd; z-index: 100;
  padding-bottom: 50px;
}
.panel-header {
  background: var(--green); color: #fff; padding: 15px;
  font-size: 16px; font-weight: 700; position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.panel-body { padding: 20px; }

.section-title {
  font-size: 12px; font-weight: 700; color: var(--green);
  text-transform: uppercase; margin: 20px 0 10px;
  padding-bottom: 5px; border-bottom: 2px solid var(--green-light);
}

.input-row { display: grid; gap: 10px; margin-bottom: 10px; }
.input-row.col2 { grid-template-columns: 1fr 1fr; }
.input-row.col3 { grid-template-columns: 1fr 1fr 1fr; }

label.lbl { display: block; font-size: 11px; font-weight: 700; color: #555; margin-bottom: 4px; }
input, select, textarea {
  width: 100%; padding: 8px; border: 1px solid #ccc;
  border-radius: 6px; font-family: inherit; font-size: 13px;
}
input:focus { border-color: var(--green); outline: none; }

/* Survey Type Tabs */
.survey-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
.tab-btn {
  flex: 1; padding: 8px 0; border: 1px solid #ddd;
  border-radius: 6px; background: #f9f9f9; cursor: pointer; font-size: 12px; font-weight: 700;
}
.tab-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

/* Sides UI */
.side-row { display: grid; grid-template-columns: 30px 1.5fr 1fr 1fr 40px; gap: 5px; margin-bottom: 8px; align-items: center; }
.side-num { background: var(--green); color: #fff; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

.del-btn { color: #ff4d4d; border: none; background: none; cursor: pointer; font-weight: bold; }

/* ── PREVIEW AREA ── */
.preview-area { margin-left: 400px; padding: 40px; display: flex; justify-content: center; }

.a4-page {
  width: 210mm; min-height: 297mm; background: #fff;
  padding: 15mm; box-shadow: var(--shadow); position: relative;
  display: flex; flex-direction: column;
}

.pad-header { text-align: center; border-bottom: 3px double var(--green); padding-bottom: 10px; margin-bottom: 20px; }
.pad-header h1 { font-family: 'Tiro Bangla', serif; color: var(--green); font-size: 28px; }

.canvas-wrap {
  flex-grow: 1; border: 2px solid #333; position: relative;
  background: #fdfdfd; min-height: 400px; margin: 20px 0;
}
canvas { width: 100%; height: 100%; display: block; }

.calc-result {
  background: var(--green-light); padding: 15px; border-radius: 8px;
  border-left: 5px solid var(--green); margin-top: 20px;
}

.btn-primary { 
    background: var(--green); color: white; border: none; padding: 12px; 
    border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
}

@media print {
  .control-panel { display: none; }
  .preview-area { margin-left: 0; padding: 0; }
  body { background: white; }
  .a4-page { box-shadow: none; width: 100%; margin: 0; }
}
</style>
</head>
<body>

<div class="control-panel">
  <div class="panel-header">🗺 নকশা কনফিগারেশন</div>
  <div class="panel-body">
    <div class="section-title">📋 জরিপের ধরন</div>
    <div class="survey-tabs">
      <button class="tab-btn active" onclick="setSurveyType('RS')">RS</button>
      <button class="tab-btn" onclick="setSurveyType('CS')">CS</button>
      <button class="tab-btn" onclick="setSurveyType('BS')">BS</button>
      <button class="tab-btn" onclick="setSurveyType('SA')">SA</button>
    </div>

    <div class="section-title">🏛 প্রতিষ্ঠানের তথ্য</div>
    <input type="text" id="hTitle" value="ডিজিটাল ভূমি জরিপ ও নকশা কেন্দ্র" oninput="updateUI()" placeholder="নাম">
    
    <div class="section-title">📄 জমির রেকর্ড</div>
    <div class="input-row col2">
      <input type="text" id="khatianNo" value="খতিয়ান: ২৪৫" oninput="updateUI()">
      <input type="text" id="dagNo" value="দাগ: ১০৫" oninput="updateUI()">
    </div>
    <div class="input-row col3">
      <input type="text" id="moujaName" value="চকবাজার" oninput="updateUI()" placeholder="মৌজা">
      <input type="text" id="upojelaName" value="কোতোয়ালী" oninput="updateUI()" placeholder="উপজেলা">
      <input type="text" id="jelaName" value="ঢাকা" oninput="updateUI()" placeholder="জেলা">
    </div>

    <div class="section-title">📏 বাহুর মাপ (ফুট)</div>
    <div id="sideInputs"></div>
    <button class="btn-primary" style="background:#eee; color:#333; border: 1px solid #ccc;" onclick="addSide('বাহু', 100, 90)">+ বাহু যোগ করুন</button>

    <div class="section-title">⚙️ কার্যক্রম</div>
    <button class="btn-primary" onclick="draw()">🔄 নকশা রিফ্রেশ করুন</button>
    <button class="btn-primary" style="background:#1a1a1a" onclick="window.print()">🖨️ প্রিন্ট / PDF</button>
  </div>
</div>

<div class="preview-area">
  <div class="a4-page" id="printableArea">
    <div class="pad-header">
        <h1 id="outTitle">ডিজিটাল ভূমি জরিপ ও নকশা কেন্দ্র</h1>
        <p id="outBadge" style="font-weight: bold; color: var(--gold);">RS জরিপ | Revisional Survey</p>
    </div>

    <div class="input-row col3" style="font-size: 12px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        <span>খতিয়ান: <b id="outKhatian"></b></span>
        <span>দাগ: <b id="outDag"></b></span>
        <span>মৌজা: <b id="outMouja"></b></span>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="noksha-canvas"></canvas>
      <div style="position: absolute; top: 10px; right: 10px; font-weight: bold; border: 1px solid #000; padding: 2px 5px;">N ↑</div>
    </div>

    <div class="calc-result" id="calcOutput">
        </div>

    <div style="margin-top: auto; display: flex; justify-content: space-between; padding-top: 50px;">
        <div style="border-top: 1px solid #000; width: 150px; text-align: center; font-size: 12px;">সার্ভেয়ারের স্বাক্ষর</div>
        <div style="border-top: 1px solid #000; width: 150px; text-align: center; font-size: 12px;">অনুমোদনকারী</div>
    </div>
  </div>
</div>

<script>
let currentSurveyType = 'RS';
let sideData = [
    { label: 'উত্তর', ft: 120, ang: 270 },
    { label: 'পূর্ব',  ft: 100, ang: 0   },
    { label: 'দক্ষিণ', ft: 120, ang: 90  },
    { label: 'পশ্চিম', ft: 100, ang: 180 }
];

function toBn(n) {
    return n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);
}

function setSurveyType(type) {
    currentSurveyType = type;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText === type);
    });
    updateUI();
}

function addSide(label, ft, ang) {
    sideData.push({ label, ft, ang });
    renderSideInputs();
    draw();
}

function renderSideInputs() {
    const container = document.getElementById('sideInputs');
    container.innerHTML = '';
    sideData.forEach((side, i) => {
        const div = document.createElement('div');
        div.className = 'side-row';
        div.innerHTML = `
            <div class="side-num">${i+1}</div>
            <input type="text" value="${side.label}" oninput="sideData[${i}].label=this.value; draw()">
            <input type="number" value="${side.ft}" oninput="sideData[${i}].ft=parseFloat(this.value); draw()">
            <input type="number" value="${side.ang}" oninput="sideData[${i}].ang=parseFloat(this.value); draw()">
            <button class="del-btn" onclick="sideData.splice(${i},1); renderSideInputs(); draw()">✕</button>
        `;
        container.appendChild(div);
    });
}

function updateUI() {
    document.getElementById('outTitle').innerText = document.getElementById('hTitle').value;
    document.getElementById('outBadge').innerText = currentSurveyType + ' জরিপ | Revisional Survey';
    document.getElementById('outKhatian').innerText = document.getElementById('khatianNo').value;
    document.getElementById('outDag').innerText = document.getElementById('dagNo').value;
    document.getElementById('outMouja').innerText = document.getElementById('moujaName').value;
}

function draw() {
    const canvas = document.getElementById('noksha-canvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('canvasWrap');
    
    canvas.width = wrap.clientWidth;
    canvas.height = 400;
    
    const scale = 2.5; 
    let points = [{x: 0, y: 0}];
    let cx = 0, cy = 0;

    sideData.forEach(side => {
        const rad = side.ang * Math.PI / 180;
        cx += side.ft * Math.cos(rad) * scale;
        cy += side.ft * Math.sin(rad) * scale;
        points.push({x: cx, y: cy});
    });

    // Center the drawing
    const minX = Math.min(...points.map(p => p.x));
    const maxX = Math.max(...points.map(p => p.x));
    const minY = Math.min(...points.map(p => p.y));
    const maxY = Math.max(...points.map(p => p.y));
    const offsetX = (canvas.width - (maxX - minX)) / 2 - minX;
    const offsetY = (canvas.height - (maxY - minY)) / 2 - minY;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Polygon
    ctx.beginPath();
    ctx.moveTo(points[0].x + offsetX, points[0].y + offsetY);
    for(let i=1; i<points.length; i++) {
        ctx.lineTo(points[i].x + offsetX, points[i].y + offsetY);
    }
    ctx.closePath();
    ctx.fillStyle = "rgba(0, 106, 78, 0.1)";
    ctx.fill();
    ctx.strokeStyle = "#006a4e";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Labels
    ctx.fillStyle = "#333";
    ctx.font = "12px Hind Siliguri";
    sideData.forEach((side, i) => {
        const p1 = points[i];
        const p2 = points[i+1] || points[0];
        const midX = (p1.x + p2.x)/2 + offsetX;
        const midY = (p1.y + p2.y)/2 + offsetY;
        ctx.fillText(`${side.label}: ${toBn(side.ft)}'`, midX, midY);
    });

    calculateArea();
    updateUI();
}

function calculateArea() {
    let area = 0;
    for (let i = 0; i < sideData.length; i++) {
        let p1 = { x: 0, y: 0 };
        let p2 = { x: 0, y: 0 };
        // Simple Shoelace logic for regular/irregular polygons
        // Here we use a simplified rectangle/triangle logic for better UX
    }
    
    // Simplification for User: Average Length x Width for Quad
    let totalFt = sideData.reduce((sum, s) => sum + s.ft, 0);
    let avgArea = (sideData[0].ft * sideData[1].ft); // Simplified example
    
    if(sideData.length === 4) {
        let a = sideData[0].ft, b = sideData[1].ft, c = sideData[2].ft, d = sideData[3].ft;
        avgArea = ((a + c) / 2) * ((b + d) / 2);
    }

    const shataangsho = avgArea / 435.6;
    const katha = avgArea / 720;

    document.getElementById('calcOutput').innerHTML = `
        <p><b>মোট ক্ষেত্রফল:</b> ${toBn(avgArea.toFixed(2))} বর্গফুট</p>
        <p style="font-size: 18px; color: var(--green);"><b>মোট জমি:</b> ${toBn(shataangsho.toFixed(3))} শতাংশ (প্রায়)</p>
        <p><b>কাঠা:</b> ${toBn(katha.toFixed(2))} কাঠা</p>
    `;
}

// Initial load
renderSideInputs();
draw();
</script>
</body>
</html>
